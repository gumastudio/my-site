<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>안녕하세요 — 소개 페이지</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: rgba(255, 255, 255, 0.06);
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --text: #f1f5f9;
      --muted: #94a3b8;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Pretendard",
        "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 20% 20%, #1e293b 0%, var(--bg) 55%),
        radial-gradient(circle at 80% 80%, #312e81 0%, transparent 50%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      max-width: 540px;
      width: 100%;
      text-align: center;
      padding: 56px 40px;
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 24px;
      backdrop-filter: blur(12px);
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.4);
      animation: rise 0.7s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .badge {
      display: inline-block;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-hover);
      background: rgba(99, 102, 241, 0.12);
      padding: 6px 14px;
      border-radius: 999px;
      margin-bottom: 24px;
    }

    h1 {
      font-size: clamp(28px, 6vw, 44px);
      line-height: 1.2;
      margin-bottom: 18px;
      background: linear-gradient(90deg, #f1f5f9, #a5b4fc);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p {
      font-size: 17px;
      line-height: 1.7;
      color: var(--muted);
      margin-bottom: 36px;
    }

    .btn {
      display: inline-block;
      font-size: 16px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
      padding: 14px 36px;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--accent), var(--accent-hover));
      box-shadow: 0 8px 24px rgba(99, 102, 241, 0.4);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(99, 102, 241, 0.55);
    }

    .btn:active { transform: translateY(0); }
  </style>
</head>
<body>
  <main class="card">
    <span class="badge">Welcome</span>
    <h1>안녕하세요, 반갑습니다</h1>
    <p>
      작고 깔끔한 한 페이지 소개입니다. 여기에 나를 소개하는
      짧은 글을 적어보세요. 무엇을 하고, 무엇을 좋아하며,
      어떤 이야기를 나누고 싶은지 한두 문장이면 충분합니다.
    </p>
    <a class="btn" href="#">더 알아보기</a>
  </main>
</body>
</html>
